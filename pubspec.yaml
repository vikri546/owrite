name: owrite
description: "A news app for the latest news and articles."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.5+3

environment:
  sdk: ^3.6.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  share_plus: ^10.0.1
  package_info_plus: ^8.2.8
  cached_network_image: ^3.2.3
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  provider: ^6.0.5
  http: ^1.2.2
  url_launcher: ^6.3.2
  connectivity_plus: ^6.1.2
  android_intent_plus: ^4.0.3
  flutter_local_notifications: ^17.2.1
  geolocator: ^11.1.0
  geocoding: ^2.1.1
  workmanager: ^0.7.0
  flutter_svg: ^2.0.9
  html_unescape: ^2.0.0
  html: ^0.15.5
  flutter_tts: ^3.8.5
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.13.0
  firebase_analytics: ^11.6.0
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_html: ^3.0.0
  flutter_html_video: ^3.0.0
  flutter_inappwebview: ^6.0.0
  flutter_inappwebview_web: ^1.0.9
  youtube_player_flutter: ^9.1.3
  webview_cookie_manager: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  mockito: ^5.3.2
  build_runner: ^2.3.3
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0

dependency_overrides:
  web: ^0.5.1

flutter_launcher_icons:
  image_path: "assets/images/icon-app.png"
  android: true
  ios: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/sounds/
    # - images/a_dot_burr.jpeg
    # - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/dm-sans-font/DmSansBold-eZ5xm.ttf
          weight: 700
        - asset: assets/fonts/dm-sans-font/DmSansBoldItalic-Wy01n.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/dm-sans-font/DmSansItalic-axW0K.ttf
          style: italic
        - asset: assets/fonts/dm-sans-font/DmSansMedium-Ea9KW.ttf
          weight: 500
        - asset: assets/fonts/dm-sans-font/DmSansMediumItalic-OVw36.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/dm-sans-font/DmSansRegular-ZVWM3.ttf
          weight: 400
    - family: CrimsonPro
      fonts:
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/Crimson_Pro/static/CrimsonPro-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Arimo
      fonts:
        - asset: assets/fonts/Arimo/static/Arimo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Arimo/static/Arimo-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Arimo/static/Arimo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Arimo/static/Arimo-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Arimo/static/Arimo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Arimo/static/Arimo-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Domine
      fonts:
        - asset: assets/fonts/Domine/static/Domine-Regular.ttf
          weight: 400
        - asset: assets/fonts/Domine/static/Domine-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/static/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Source_Serif_4/static/SourceSerif4_18pt-BoldItalic.ttf
          weight: 700
          style: italic
    - family: BG_Condensed
      fonts:
        - asset: assets/fonts/Bricolage_Grotesque/static/BricolageGrotesque_24pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Bricolage_Grotesque/static/BricolageGrotesque_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Bricolage_Grotesque/static/BricolageGrotesque_24pt-Bold.ttf
          weight: 700
    - family: Anton
      fonts:
        - asset: assets/fonts/Anton/Anton-Regular.ttf
          weight: 400
